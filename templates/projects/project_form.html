{% extends "base.html" %}

{% block content %}
<section class="crm-form-panel">
    <div class="crm-panel-header">
        <div>
            <p class="crm-panel-kicker">Project form</p>
            <h3>{% if form_mode == 'edit' %}Edit project{% else %}Create project{% endif %}</h3>
        </div>
    </div>

    <form class="crm-form-grid" method="post" action="{{ form_action }}">
        <input type="hidden" name="updated_by" value="Yee">

        <label>
            <span>Service name</span>
            <input class="crm-input" type="text" name="service_name" value="{{ project.service_name }}">
        </label>
        <label>
            <span>Project name</span>
            <input class="crm-input" type="text" name="project_name" value="{{ project.project_name }}">
        </label>
        <label>
            <span>Client name</span>
            <input class="crm-input" type="text" name="client_name" value="{{ project.client_name }}">
        </label>
        <label>
            <span>Priority</span>
            <select class="crm-select" name="priority">
                {% for priority in priority_options %}
                    <option value="{{ priority }}" {% if project.priority == priority %}selected{% endif %}>{{ priority }}</option>
                {% endfor %}
            </select>
        </label>
        <label>
            <span>Owner</span>
            <input class="crm-input" type="text" name="owner" value="{{ project.owner }}">
        </label>
        <label>
            <span>Contact number</span>
            <input class="crm-input" type="text" name="contact_number" value="{{ project.contact_number }}">
        </label>
        <label>
            <span>Start date</span>
            <input class="crm-input" type="date" name="start_date" value="{{ project.start_date }}">
        </label>
        <label>
            <span>Due date</span>
            <input class="crm-input" type="date" name="due_date" value="{{ project.due_date }}">
        </label>
        <label class="full">
            <span>Remark</span>
            <textarea class="crm-textarea" name="remark" rows="5">{{ project.remark }}</textarea>
        </label>

        <div class="crm-form-actions full">
            <a class="crm-button crm-button-ghost" href="{{ url_for('projects_table') }}">Cancel</a>
            <button class="crm-button crm-button-primary" type="submit">
                {% if form_mode == 'edit' %}Save project{% else %}Create project{% endif %}
            </button>
        </div>
    </form>
</section>
{% endblock %}
