<div class="crm-stack">
    {% for comment in comments %}
        <article class="crm-comment-item">
            <div class="crm-comment-avatar">{{ comment.created_by[:1] }}</div>
            <div>
                <p class="crm-comment-title">{{ comment.created_by }}</p>
                <p class="crm-comment-meta">{{ comment.created_at|datetime_label }}</p>
                <p class="crm-comment-body">{{ comment.comment_text }}</p>
            </div>
        </article>
    {% else %}
        <p class="crm-empty-inline">No comments yet.</p>
    {% endfor %}
</div>
