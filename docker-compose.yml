services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: monitoring-aap-web
    ports:
      - "8080:8080"
    environment:
      APP_ENV: production
      SECRET_KEY: ${SECRET_KEY:-change-this-before-production}
      SESSION_COOKIE_SECURE: "false"
      SESSION_COOKIE_SAMESITE: Lax
      PREFERRED_URL_SCHEME: http
      DATABASE_PATH: /data/workspace.sqlite3
      SEED_DATA: ${SEED_DATA:-false}
      PORT: "8080"
      WSGI_HOST: 0.0.0.0
      WAITRESS_THREADS: ${WAITRESS_THREADS:-4}
    volumes:
      - sqlite_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  sqlite_data:
